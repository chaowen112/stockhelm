<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StockHelm</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-96">
        <h1 class="text-2xl font-bold mb-6 text-center">StockHelm Login</h1>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm mb-1">Username</label>
                <input type="text" id="username" class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500" required>
            </div>
            <div>
                <label class="block text-sm mb-1">Password</label>
                <input type="password" id="password" class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded font-bold transition">Login</button>
        </form>
        <p id="error-msg" class="text-red-500 mt-4 hidden text-center"></p>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
