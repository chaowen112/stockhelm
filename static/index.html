<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockHelm Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pnl-positive { color: #10b981; }
        .pnl-negative { color: #ef4444; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">
    <nav class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tight">StockHelm</h1>
        <div class="flex items-center space-x-4">
            <span id="pnl-summary" class="text-sm font-medium">PnL: 0.00</span>
            <button id="logout-btn" class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm font-medium transition">Logout</button>
        </div>
    </nav>

    <div class="container mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Sidebar: Watchlist -->
        <div class="md:col-span-1 space-y-6">
            <div class="bg-gray-800 p-4 rounded-lg shadow">
                <h2 class="text-lg font-bold mb-4 border-b border-gray-700 pb-2">Watchlist</h2>
                <div class="flex mb-4">
                    <input type="text" id="symbol-input" placeholder="Symbol (e.g. 2330)" class="w-full p-2 bg-gray-700 rounded-l border border-gray-600 focus:outline-none text-sm">
                    <button id="add-watchlist-btn" class="bg-blue-600 px-4 rounded-r text-sm font-bold">Add</button>
                </div>
                <ul id="watchlist-items" class="space-y-2">
                    <!-- Items injected here -->
                </ul>
            </div>
        </div>

        <!-- Main Content -->
        <div class="md:col-span-2 space-y-6">
            <!-- Order Form -->
            <div class="bg-gray-800 p-4 rounded-lg shadow">
                <h2 class="text-lg font-bold mb-4 border-b border-gray-700 pb-2">New Paper Order</h2>
                <form id="order-form" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <select id="order-broker" class="p-2 bg-gray-700 rounded border border-gray-600 text-sm">
                        <option value="SHIOAJI">Shioaji</option>
                        <option value="IBKR" disabled>IBKR (Future)</option>
                    </select>
                    <input type="text" id="order-symbol" placeholder="Symbol" class="p-2 bg-gray-700 rounded border border-gray-600 text-sm" required>
                    <select id="order-action" class="p-2 bg-gray-700 rounded border border-gray-600 text-sm">
                        <option value="BUY">BUY</option>
                        <option value="SELL">SELL</option>
                    </select>
                    <input type="number" id="order-qty" placeholder="Qty" class="p-2 bg-gray-700 rounded border border-gray-600 text-sm" required>
                    <select id="order-type" class="p-2 bg-gray-700 rounded border border-gray-600 text-sm">
                        <option value="MKT">Market</option>
                        <option value="LMT">Limit</option>
                    </select>
                    <input type="number" id="order-price" placeholder="Price (Limit only)" class="p-2 bg-gray-700 rounded border border-gray-600 text-sm" step="0.01">
                    <button type="submit" class="col-span-2 md:col-span-1 bg-green-600 hover:bg-green-700 rounded font-bold text-sm py-2">Place Order</button>
                </form>
            </div>

            <!-- Tabs for Tables -->
            <div class="bg-gray-800 rounded-lg shadow">
                <div class="flex border-b border-gray-700">
                    <button class="tab-btn active px-4 py-2 text-sm font-bold border-b-2 border-blue-500" data-tab="positions">Positions</button>
                    <button class="tab-btn px-4 py-2 text-sm font-bold border-b-2 border-transparent" data-tab="orders">Pending Orders</button>
                    <button class="tab-btn px-4 py-2 text-sm font-bold border-b-2 border-transparent" data-tab="fills">Fills</button>
                </div>
                <div class="p-4">
                    <div id="positions-tab" class="tab-content">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="text-gray-400">
                                    <th class="pb-2">Symbol</th>
                                    <th class="pb-2">Qty</th>
                                    <th class="pb-2">Avg Cost</th>
                                    <th class="pb-2">Last Price</th>
                                    <th class="pb-2">Unrealized PnL</th>
                                </tr>
                            </thead>
                            <tbody id="positions-body"></tbody>
                        </table>
                    </div>
                    <div id="orders-tab" class="tab-content hidden">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-sm font-bold">Pending Orders</h3>
                            <button id="cancel-all-btn" class="text-xs bg-red-600 px-2 py-1 rounded">Cancel All</button>
                        </div>
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="text-gray-400">
                                    <th class="pb-2">Symbol</th>
                                    <th class="pb-2">Action</th>
                                    <th class="pb-2">Qty</th>
                                    <th class="pb-2">Price</th>
                                    <th class="pb-2">Status</th>
                                    <th class="pb-2">Action</th>
                                </tr>
                            </thead>
                            <tbody id="orders-body"></tbody>
                        </table>
                    </div>
                    <div id="fills-tab" class="tab-content hidden">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="text-gray-400">
                                    <th class="pb-2">Time</th>
                                    <th class="pb-2">Symbol</th>
                                    <th class="pb-2">Qty</th>
                                    <th class="pb-2">Price</th>
                                </tr>
                            </thead>
                            <tbody id="fills-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
